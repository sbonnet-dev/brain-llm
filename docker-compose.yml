services:
  brain-llm:
    build:
      context: .
      dockerfile: Dockerfile
    image: brain-llm:latest
    container_name: brain-llm
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_NAME: ${APP_NAME:-brain-llm}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/brain_llm.db}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      VLLM_BASE_URL: ${VLLM_BASE_URL:-http://vllm:8000/v1}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
    volumes:
      - brain_llm_data:/app/data
    restart: unless-stopped
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: brain-llm-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  brain_llm_data:
  ollama_data:
